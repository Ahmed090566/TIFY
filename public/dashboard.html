<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>This Is For You - المحادثات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <div id="loadingScreen" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999;">
            <div style="text-align: center;">
                <div style="width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                <p style="color: #667eea;">جاري التحميل...</p>
            </div>
        </div>
        
        <style>
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
        
        <div id="chatsView" class="chats-view active" style="display: none;">
            <div class="page-header">
                <div class="header-left">
                    <div class="profile-avatar-small" onclick="openProfileModal()">
                        <img id="profileAvatarSmall" src="" alt="صورة شخصية">
                    </div>
                    <div>
                        <h2 class="logo-small">✨ TIFY ✨</h2>
                        <p class="welcome-text">مرحباً، <span id="userNameDisplay"></span></p>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">🚪 خروج</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 ابحث باسم أو رقم هاتف..." autocomplete="off" onkeyup="searchUsers()">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <div class="empty-state"><span>💬</span><p>لا توجد محادثات بعد</p><p style="font-size: 12px; margin-top: 8px;">ابحث عن شخص لبدء المحادثة</p></div>
            </div>
        </div>
        
        <div id="contactsView" class="contacts-view" style="display: none;">
            <div class="page-header">
                <div class="header-left">
                    <div class="profile-avatar-small" onclick="openProfileModal()">
                        <img id="profileAvatarSmall2" src="" alt="صورة شخصية">
                    </div>
                    <div>
                        <h2 class="logo-small">✨ TIFY ✨</h2>
                        <p class="welcome-text">اكتشف أصدقاء جدد</p>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">🚪 خروج</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInputContacts" placeholder="🔍 ابحث باسم أو رقم هاتف..." autocomplete="off" onkeyup="searchUsersContacts()">
                <div id="searchResultsContacts" class="search-results"></div>
            </div>
            
            <div class="conversations-list" id="contactsList">
                <div class="empty-state"><span>👥</span><p>ابحث عن أشخاص للتواصل معهم</p></div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('chats')"><span>💬</span><p>المحادثات</p></div>
            <div class="nav-item" onclick="switchTab('contacts')"><span>👥</span><p>جهات الاتصال</p></div>
            <div class="nav-item" onclick="openProfileModal()"><span>👤</span><p>الملف الشخصي</p></div>
        </div>
    </div>
    
    <div id="chatView" class="chat-view">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <h3 id="chatUserName">...</h3>
            <div style="width: 40px;"></div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state"><span>💬</span><p>ابدأ المحادثة الآن</p></div>
        </div>
        <div class="message-input">
            <button onclick="sendImage()" class="image-btn">📷</button>
            <input type="text" id="messageText" placeholder="اكتب رسالتك..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button id="sendButton" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
    
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>👤 الملف الشخصي</h3><button class="close-modal" onclick="closeProfileModal()">✕</button></div>
            <div class="modal-body">
                <div class="profile-image-container" onclick="changeProfileImage()">
                    <img id="profileImage" src="" alt="صورة شخصية">
                    <div class="profile-image-overlay"><span>📷 تغيير الصورة</span></div>
                </div>
                <div class="profile-info">
                    <div class="info-row"><label>👤 الاسم الأول:</label><input type="text" id="profileFirstName" readonly></div>
                    <div class="info-row"><label>👤 الاسم الثاني:</label><input type="text" id="profileLastName" readonly></div>
                    <div class="info-row"><label>📞 رقم الهاتف:</label><input type="tel" id="profilePhone" readonly></div>
                    <div class="info-row"><label>✉️ البريد الإلكتروني:</label><input type="email" id="profileEmail" readonly></div>
                    <div class="info-row"><label>📅 تاريخ التسجيل:</label><input type="text" id="profileDate" readonly></div>
                </div>
                <button onclick="editProfile()" class="edit-profile-btn">✏️ تعديل الملف الشخصي</button>
                <div id="editProfileForm" style="display: none; margin-top: 15px;">
                    <div class="info-row"><label>👤 الاسم الأول:</label><input type="text" id="editFirstName"></div>
                    <div class="info-row"><label>👤 الاسم الثاني:</label><input type="text" id="editLastName"></div>
                    <div class="info-row"><label>✉️ البريد الإلكتروني:</label><input type="email" id="editEmail"></div>
                    <button onclick="saveProfileChanges()" class="save-btn">💾 حفظ التغييرات</button>
                    <button onclick="cancelEdit()" class="cancel-btn">❌ إلغاء</button>
                </div>
            </div>
        </div>
    </div>
    
    <div style="position: fixed; bottom: 80px; left: 10px; z-index: 999;">
        <button onclick="showUsersData()" class="admin-btn">👥</button>
    </div>
    
    <div id="dataModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; overflow: auto;">
        <div style="background: white; border-radius: 20px; max-width: 95%; max-height: 90%; overflow: auto; padding: 20px; margin: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h3 style="margin: 0;">📋 بيانات المستخدمين</h3>
                <div>
                    <button onclick="exportUsersToJSON()" style="background: #28a745; color: white; border: none; border-radius: 8px; padding: 8px 12px; margin-left: 8px; cursor: pointer;">📥 تصدير</button>
                    <button onclick="closeDataModal()" style="background: #dc3545; color: white; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer;">✕ إغلاق</button>
                </div>
            </div>
            <div id="usersDataContent" style="max-height: 60vh; overflow: auto;"><p style="text-align: center; color: #999;">جاري التحميل...</p></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loadingScreen');
                const chatsView = document.getElementById('chatsView');
                if (loadingScreen) loadingScreen.style.display = 'none';
                if (chatsView) chatsView.style.display = 'flex';
            }, 500);
        });
    </script>
</body>
</html>
